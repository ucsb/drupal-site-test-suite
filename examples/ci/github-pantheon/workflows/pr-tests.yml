# ──────────────────────────────────────────────────────────────────────────
# EXAMPLE — not wired to run in this repo. This is the Pantheon-multidev CI
# the suite's authors use, provided as a starting point. The test suite itself
# is host-agnostic: this pipeline runs the lanes directly (the lint orchestrator
# + Playwright specs + the PHPUnit runner) against the deployed multidev;
# `drush utest:*` is the local-dev entry point. Replace every placeholder
# (your-site-*, example_theme, AXE_PROJECT_ID, secrets) before using, and move
# into .github/workflows/.
# ──────────────────────────────────────────────────────────────────────────
name: PR Quality Checks

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]

# Least privilege for GITHUB_TOKEN: checkout reads the repo, github-script
# posts the PR results comment and lists run artifacts for report links,
# and push-to-pantheon / bobheadxi-deployments create and finish the
# pr-<N> deployment records.
permissions:
  contents: read
  pull-requests: write
  deployments: write
  actions: read

env:
  # Broadest WCAG/best-practice ruleset; the report's filter chips narrow it.
  # Merge gating uses A11Y_SEVERITY_LEVELS below, so findings don't block PRs.
  A11Y_PROFILE: comprehensive
  # Test both critical and serious violations
  A11Y_SEVERITY_LEVELS: critical,serious
  # axe Developer Hub project ID for dashboard links (set per-project)
  AXE_PROJECT_ID: "00000000-0000-0000-0000-000000000000"  # your axe DevHub project id (optional)

# Cancel a superseded run for the same PR: avoids two runs racing on the same
# pr-<N> multidev, and saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Per-PR secrets scan over the git history (once per PR). Blocking: a hit
  # must be rotated and the commit rewritten. Allowlist fixtures in .gitleaks.toml.
  secrets-scanning:
    name: Secrets scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v6
        with:
          # gitleaks scans the diff between base and head; full history
          # ensures the diff is complete on long-lived branches.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan PR diff for committed secrets
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CONFIG_FLAG=""
          if [ -f tests/code-quality/security/.gitleaks.toml ]; then
            CONFIG_FLAG="--config=tests/code-quality/security/.gitleaks.toml"
          fi

          echo "Scanning ${BASE_SHA}..${HEAD_SHA} for committed secrets..."

          # `gitleaks detect` exits 1 when secrets are found; we want that to
          # fail the workflow so the check goes red. The JSON report is
          # uploaded as an artifact for inspection regardless of outcome.
          set +e
          gitleaks detect \
            ${CONFIG_FLAG} \
            --source=. \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --exit-code=1 \
            --redact \
            --verbose
          GITLEAKS_EXIT=$?
          set -e

          if [ "$GITLEAKS_EXIT" -eq 0 ]; then
            echo "✅ No secrets detected in PR diff"
          else
            COUNT=$(jq 'length' gitleaks-report.json 2>/dev/null || echo "?")
            echo "❌ gitleaks flagged ${COUNT} potential secret(s) - see report artifact below"
            echo ""
            echo "Resolution steps:"
            echo "  1. Rotate the leaked credential immediately (assume it is compromised)"
            echo "  2. Rewrite the commit history to remove the value"
            echo "  3. If the finding is a false positive (test fixture, documented example),"
            echo "     add an allowlist entry to tests/code-quality/security/.gitleaks.toml"
            exit "$GITLEAKS_EXIT"
          fi

      # The report is safe to upload because the scan runs with --redact:
      # matched secret values are masked, only locations are reported. Short
      # retention since it is only needed while the finding is triaged.
      - name: Upload gitleaks report
        if: always() && hashFiles('gitleaks-report.json') != ''
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7

  # Repo-wide lint pass (once per PR), same surface as `drush utest:lint`.
  # The accessibility job downloads this artifact and SFTPs it to the
  # multidev so the lint report is browsable alongside the a11y report.
  lint:
    name: Code linting
    needs: secrets-scanning
    # Skip the test lane when a PR is labelled 'skip-tests' (e.g. a hotfix
    # release with no time to run the suite). Secrets-scanning still runs.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      result: ${{ steps.lint.outputs.lint_result }}
      errors: ${{ steps.lint.outputs.lint_errors }}
      warnings: ${{ steps.lint.outputs.lint_warnings }}
      totals_emitted: ${{ steps.lint.outputs.lint_totals_emitted }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        # Retry on transient GitHub/Packagist CDN errors (HTTP 5xx on
        # archive zips, e.g. github.com/<user>/<repo>/archive/...). Three
        # attempts with a brief backoff cover the typical 502/503 windows.
        run: |
          for attempt in 1 2 3; do
            if composer install --no-interaction --prefer-dist --optimize-autoloader; then
              echo "✅ composer install succeeded on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "❌ composer install failed after 3 attempts"
              exit 1
            fi
            echo "⚠️ composer install failed on attempt ${attempt} - retrying in 30s..."
            sleep 30
          done

      - name: Install Node.js dependencies
        run: |
          cd tests
          npm ci

      - name: Cache PHPStan result cache
        # Restore PHPStan's incremental result cache so it re-analyses only
        # changed files + dependents. run_id makes the save key unique each
        # run; restore-keys pulls the most recent cache to build on.
        uses: actions/cache@v5
        with:
          path: tests/.cache/phpstan
          key: ${{ runner.os }}-phpstan-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-phpstan-

      - name: Run code quality tests
        id: lint
        continue-on-error: true
        run: |
          set +o pipefail
          echo "Running code quality test suite for all custom modules + themes + profiles..."
          echo "PHPCS · PHPStan · ESLint · cspell · composer (validate + audit) · markdownlint · actionlint · twigcs · htmlhint · stylelint · yaml-lint · editorconfig"
          echo "────────────────────────────────────────────────────────────────────"

          cd tests
          # No --theme / --module flag - full repo-wide pass.
          node code-quality/lint-orchestrator.js 2>&1 | tee lint-output.txt
          LINT_EXIT_CODE=${PIPESTATUS[0]}

          echo "────────────────────────────────────────────────────────────────────"

          # Prefer the orchestrator's lint-totals.json; fall back to scraping
          # stdout, then to "crashed". Avoids reporting a false 0/0.
          TOTALS_JSON="reports/lint/lint-totals.json"
          if [ -f "$TOTALS_JSON" ]; then
            LINT_ERRORS=$(jq -r '.errors // 0' "$TOTALS_JSON")
            LINT_WARNINGS=$(jq -r '.warnings // 0' "$TOTALS_JSON")
            LINT_TOTALS_EMITTED=true
          elif grep -q "Total errors:" lint-output.txt; then
            LINT_ERRORS=$(grep "Total errors:" lint-output.txt | tail -1 | sed 's/.*Total errors: \([0-9]*\).*/\1/')
            LINT_WARNINGS=$(grep "Total warnings:" lint-output.txt | tail -1 | sed 's/.*Total warnings: \([0-9]*\).*/\1/')
            LINT_TOTALS_EMITTED=true
          else
            LINT_ERRORS=0
            LINT_WARNINGS=0
            LINT_TOTALS_EMITTED=false
            echo "::warning::Lint orchestrator did not emit 'Total errors:' line and lint-totals.json is missing - dumping last 80 lines of output for diagnosis:"
            echo "──────── tail of lint-output.txt ────────"
            tail -n 80 lint-output.txt || echo "(lint-output.txt unreadable or empty)"
            echo "──────── end of tail ────────"
          fi

          echo "Linting Summary:"
          echo "   Errors:   $LINT_ERRORS"
          echo "   Warnings: $LINT_WARNINGS"
          echo "   Totals emitted: $LINT_TOTALS_EMITTED"

          if [ "$LINT_EXIT_CODE" -eq 0 ]; then
            echo "lint_result=passed" >> $GITHUB_OUTPUT
          else
            echo "lint_result=failed" >> $GITHUB_OUTPUT
          fi
          echo "lint_errors=$LINT_ERRORS" >> $GITHUB_OUTPUT
          echo "lint_warnings=$LINT_WARNINGS" >> $GITHUB_OUTPUT
          echo "lint_totals_emitted=$LINT_TOTALS_EMITTED" >> $GITHUB_OUTPUT

          rm -f lint-output.txt

      - name: Upload lint report artifact
        if: always() && hashFiles('tests/reports/lint/**') != ''
        uses: actions/upload-artifact@v6
        with:
          name: lint-report
          path: tests/reports/lint/
          retention-days: 30

  functional-testing:
    name: Functional / Regression (PHPUnit)
    needs: secrets-scanning
    # Same skip-tests escape hatch as the lint job. Runs in parallel with lint,
    # before accessibility. Report-only - never fails the build.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.phpunit.outputs.phpunit_status }}
      tests: ${{ steps.phpunit.outputs.phpunit_tests }}
      failures: ${{ steps.phpunit.outputs.phpunit_failures }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies (with dev - PHPUnit)
        run: |
          for attempt in 1 2 3; do
            if composer install --no-interaction --prefer-dist --optimize-autoloader; then
              echo "✅ composer install succeeded on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "❌ composer install failed after 3 attempts"
              exit 1
            fi
            echo "⚠️ composer install failed on attempt ${attempt} - retrying in 30s..."
            sleep 30
          done

      - name: Install Node.js dependencies
        run: |
          cd tests
          npm ci

      - name: Run custom-module PHPUnit tests (report-only)
        id: phpunit
        continue-on-error: true
        run: |
          node tests/phpunit/run.js tests/reports/phpunit
          # Surface a pass/fail summary for the PR comment (report-only - the
          # findings are failing tests; files_scanned is the total run).
          F=tests/reports/phpunit/test-suite-findings.json
          if [ -f "$F" ]; then
            TESTS=$(node -e "console.log(require('./$F').summary.files_scanned || 0)")
            FAILS=$(node -e "console.log((require('./$F').findings || []).length)")
          else
            TESTS=0; FAILS=0
          fi
          if [ "$TESTS" -eq 0 ]; then STATUS=skipped
          elif [ "$FAILS" -eq 0 ]; then STATUS=passed
          else STATUS=failed; fi
          {
            echo "phpunit_status=$STATUS"
            echo "phpunit_tests=$TESTS"
            echo "phpunit_failures=$FAILS"
          } >> "$GITHUB_OUTPUT"

      - name: Upload PHPUnit report artifact
        if: always() && hashFiles('tests/reports/phpunit/**') != ''
        uses: actions/upload-artifact@v6
        with:
          name: phpunit-report
          path: tests/reports/phpunit/
          retention-days: 30

  accessibility-testing:
    name: Accessibility Testing - ${{ matrix.theme_name }} Theme
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Runs after lint so its report ships in the same SFTP push. Each matrix
    # entry deploys to its multidev, runs a11y, uploads, renders, and comments.
    needs: [secrets-scanning, lint, functional-testing]
    # Skip for Dependabot (restricted secrets break push-to-pantheon); lint +
    # secrets still run. Also honor the 'skip-tests' label.
    if: ${{ github.actor != 'dependabot[bot]' && !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Single theme/site. Add more entries here only if you test multiple themes.
          - theme_name: example_theme
            theme_display_name: "Example Theme"
            pantheon_site: your-site
            theme_path: web/themes/custom/example_theme
            source_env: dev

    steps:
      - name: Verify required Pantheon secrets are configured
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          missing=""
          [ -z "$PANTHEON_SSH_KEY" ] && missing="$missing PANTHEON_SSH_KEY"
          [ -z "$PANTHEON_MACHINE_TOKEN" ] && missing="$missing PANTHEON_MACHINE_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secret(s):$missing. Configure them in Actions secrets before the accessibility lane runs."
            exit 1
          fi
          echo "Required Pantheon secrets present."

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Verify Node.js version
        run: |
          echo "Node.js version: $(node --version)"
          echo "npm version: $(npm --version)"
          if [[ "$(node --version)" < "v20.0.0" ]]; then
            echo "❌ Node.js version is too old. Required: >=20.0.0"
            exit 1
          else
            echo "✅ Node.js version meets requirements"
          fi

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        # Retry on transient GitHub/Packagist CDN errors (HTTP 5xx on
        # archive zips, e.g. github.com/<user>/<repo>/archive/...).
        run: |
          for attempt in 1 2 3; do
            if composer install --no-interaction --prefer-dist --optimize-autoloader; then
              echo "✅ composer install succeeded on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "❌ composer install failed after 3 attempts"
              exit 1
            fi
            echo "⚠️ composer install failed on attempt ${attempt} - retrying in 30s..."
            sleep 30
          done

      - name: Install Node.js dependencies
        run: |
          cd tests
          npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          cd tests
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            # Browser binaries restored from cache - only the OS-level libs
            # (apt packages) still need installing; skips the ~130 MB download.
            npx playwright install-deps
          else
            npx playwright install --with-deps
          fi
          echo "✅ Playwright browsers ready"

      - name: Download lint report
        # The one repo-wide lint artifact is shared (into
        # tests/reports/lint/ for the SFTP step). Hard-fail if it's missing.
        uses: actions/download-artifact@v6
        with:
          name: lint-report
          path: tests/reports/lint

      - name: Download PHPUnit report
        # Report-only lane - don't fail accessibility if it's missing or skipped.
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: phpunit-report
          path: tests/reports/phpunit

      - name: Deploy PR changes to ${{ matrix.theme_name }} theme multidev using official Pantheon action
        id: multidev
        # Don't hard-fail if the multidev can't be created (e.g. quota reached);
        # steps below are guarded on it and the run reports as incomplete.
        continue-on-error: true
        uses: pantheon-systems/push-to-pantheon@0.9.2
        with:
          ssh_key: ${{ secrets.PANTHEON_SSH_KEY }}
          machine_token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          site: ${{ matrix.pantheon_site }}
          target_env: pr-${{ github.event.pull_request.number }}
          source_env: ${{ matrix.source_env }}
          clone_content: true

      - name: Set multidev outputs for ${{ matrix.theme_name }} theme
        id: setvars
        run: |
          # Create multidev name from PR number (consistent with Pantheon action naming)
          MULTIDEV_NAME="pr-${{ github.event.pull_request.number }}"
          echo "multidev_name=${MULTIDEV_NAME}" >> $GITHUB_OUTPUT

          # Get the multidev URL
          MULTIDEV_URL="https://${MULTIDEV_NAME}-${{ matrix.pantheon_site }}.pantheonsite.io"
          echo "multidev_url=${MULTIDEV_URL}" >> $GITHUB_OUTPUT

          # Propagate to subsequent steps via $GITHUB_ENV so the findings emitter's
          # buildSurface() detector sees MULTIDEV_URL and labels the report as
          # "CI · multidev" instead of falling through to "Local".
          echo "MULTIDEV_URL=${MULTIDEV_URL}" >> $GITHUB_ENV
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

          echo "✅ Pantheon official action deployed PR changes to ${{ matrix.theme_name }} theme"
          echo "Multidev URL: ${MULTIDEV_URL}"

      - name: Run database updates and clear cache for ${{ matrix.theme_name }} theme
        if: steps.multidev.outcome == 'success'
        run: |
          MULTIDEV_NAME="${{ steps.setvars.outputs.multidev_name }}"
          echo "Running post-deployment updates for ${{ matrix.theme_name }} theme multidev ${MULTIDEV_NAME}..."

          # Run database updates (updb) to ensure schema consistency after code deployment
          echo "Running database updates (updb)..."
          if terminus drush ${{ matrix.pantheon_site }}.${MULTIDEV_NAME} updb -y; then
            echo "✅ Database updates completed successfully"
          else
            echo "⚠️ Database updates failed or no updates were needed"
            echo "This is often normal if the PR doesn't include database schema changes"
          fi

          # Clear all caches to ensure fresh state for testing
          echo "Clearing all caches..."
          if terminus env:clear-cache ${{ matrix.pantheon_site }}.${MULTIDEV_NAME}; then
            echo "✅ Cache cleared successfully"
          else
            echo "❌ Failed to clear cache"
            echo "This could affect test reliability"
            exit 1
          fi

          echo "⏳ Waiting for cache clearing to complete..."
          sleep 15  # Allow time for cache clearing to propagate

      - name: Wait for ${{ matrix.theme_name }} theme site to be ready
        if: steps.multidev.outcome == 'success'
        run: |
          echo "⏳ Waiting for ${{ matrix.theme_name }} theme site to be fully ready..."
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          # Robust health check with retry logic that handles redirects
          site_ready=false
          for attempt in {1..15}; do
            echo "Health check attempt ${attempt}/15 for ${{ matrix.theme_name }} theme..."

            # Get HTTP status code following redirects
            http_code=$(curl -L -s -o /dev/null -w "%{http_code}" "${MULTIDEV_URL}" || echo "000")

            # Check for successful responses (2xx) or redirects that lead to success
            if [[ "$http_code" =~ ^2[0-9][0-9]$ ]]; then
              echo "✅ ${{ matrix.theme_name }} theme site is responding with HTTP ${http_code}"
              site_ready=true
              break
            elif [[ "$http_code" =~ ^3[0-9][0-9]$ ]]; then
              # Handle redirects - check if they lead to a working page
              echo "Site returned HTTP ${http_code} (redirect), checking final destination..."

              # Follow redirects and get final status
              final_code=$(curl -L -s -o /dev/null -w "%{http_code}" "${MULTIDEV_URL}" || echo "000")
              final_url=$(curl -L -s -o /dev/null -w "%{url_effective}" "${MULTIDEV_URL}" || echo "unknown")

              if [[ "$final_code" =~ ^2[0-9][0-9]$ ]]; then
                echo "✅ ${{ matrix.theme_name }} theme site redirects to working page (HTTP ${final_code})"
                echo "Final URL: ${final_url}"
                site_ready=true
                break
              else
                echo "⚠️ Redirect leads to HTTP ${final_code} at ${final_url}, waiting 30 seconds before retry..."
              fi
            else
              echo "⚠️ Site returned HTTP ${http_code}, waiting 30 seconds before retry..."
            fi

            if [[ $attempt -eq 15 ]]; then
              echo "❌ ${{ matrix.theme_name }} theme site failed to become ready after 15 attempts (7.5 minutes)"
              echo "Final HTTP status: ${http_code}"
              echo "URL tested: ${MULTIDEV_URL}"

              # Additional debugging for redirects
              if [[ "$http_code" =~ ^3[0-9][0-9]$ ]]; then
                final_url=$(curl -L -s -o /dev/null -w "%{url_effective}" "${MULTIDEV_URL}" || echo "unknown")
                echo "Redirect destination: ${final_url}"
              fi

              echo "This could indicate:"
              echo "- Multidev environment is still initializing"
              echo "- Site configuration issues (check redirect loops)"
              echo "- DNS propagation delays"
              echo "- Pantheon platform issues"
              echo "- Authentication or access restrictions"
              exit 1
            fi

            sleep 30
          done

          if [[ "$site_ready" == "true" ]]; then
            echo "✅ ${{ matrix.theme_name }} theme site is ready for accessibility testing"
            echo "Testing URL: ${MULTIDEV_URL}"
          fi

      - name: Setup sitemap for ${{ matrix.theme_name }} theme
        if: steps.multidev.outcome == 'success'
        run: |
          SITE="${{ matrix.pantheon_site }}"
          MULTIDEV="${{ steps.setvars.outputs.multidev_name }}"
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          echo "Setting up sitemap for accessibility testing..."

          # Enable Simple XML Sitemap module if not already enabled
          echo "Ensuring Simple XML Sitemap module is enabled..."
          terminus drush ${SITE}.${MULTIDEV} -- pm:enable simple_sitemap -y || echo "Module may already be enabled"

          # Clear caches first to ensure fresh state
          echo "Clearing caches before sitemap operations..."
          terminus drush ${SITE}.${MULTIDEV} -- cache:rebuild

          # Check existing content (multidev should have content from dev environment)
          echo "Checking existing content..."
          CONTENT_COUNT=$(terminus drush ${SITE}.${MULTIDEV} -- sql:query "SELECT COUNT(*) as count FROM node WHERE status = 1" --format=string 2>/dev/null || echo "0")
          echo "Found ${CONTENT_COUNT} published nodes from dev environment"

          # Lock the sitemap base URL to the multidev: CLI generation defaults
          # to http and the wrong host otherwise, producing <loc> entries the
          # same-origin checks reject.
          echo "Setting sitemap base URL to ${MULTIDEV_URL}..."
          terminus drush ${SITE}.${MULTIDEV} -- config:set simple_sitemap.settings base_url "${MULTIDEV_URL}" -y || echo "Could not set sitemap base_url, continuing"

          # Rebuild sitemap queue (helps after DB clones)
          echo "Rebuilding sitemap queue..."
          terminus drush ${SITE}.${MULTIDEV} -- simple-sitemap:rebuild-queue || echo "Queue rebuild failed, continuing"

          # Generate sitemap with proper URI to prevent http(s)://default host issues
          echo "Generating sitemap with proper URI..."
          terminus drush ${SITE}.${MULTIDEV} -- --uri="${MULTIDEV_URL}" simple-sitemap:generate || echo "Sitemap generation failed"

          # Clear caches again to ensure sitemap is accessible
          echo "Clearing caches after sitemap generation..."
          terminus drush ${SITE}.${MULTIDEV} -- cache:rebuild

          # Verify sitemap exists and count URLs (with Pantheon bypass header)
          echo "Verifying sitemap with Pantheon bypass header..."
          SITEMAP_CHECK=$(curl -s -o /dev/null -w "%{http_code}" -H "Deterrence-Bypass: 1" "${MULTIDEV_URL}/sitemap.xml")
          if [ "$SITEMAP_CHECK" = "200" ]; then
            echo "✅ Sitemap is accessible at ${MULTIDEV_URL}/sitemap.xml"

            # Count URLs in sitemap (with bypass header)
            URL_COUNT=$(curl -s -H "Deterrence-Bypass: 1" "${MULTIDEV_URL}/sitemap.xml" | grep -c "<loc>" || echo "0")
            echo "Found ${URL_COUNT} URLs in sitemap"

            if [ "$URL_COUNT" -gt "0" ]; then
              echo "✅ Sitemap contains URLs for testing"
              # Show first few URLs for verification (with bypass header)
              echo "Sample URLs from sitemap:"
              curl -s -H "Deterrence-Bypass: 1" "${MULTIDEV_URL}/sitemap.xml" | grep "<loc>" | head -5 | sed 's/.*<loc>\(.*\)<\/loc>.*/  - \1/' || echo "Could not extract sample URLs"
            else
              echo "⚠️ Sitemap is empty, tests will use fallback URLs"
            fi
          else
            echo "⚠️ Sitemap returned HTTP ${SITEMAP_CHECK}, tests will use fallback URLs"
          fi

      - name: Run Siteimprove Alfa accessibility tests for ${{ matrix.theme_name }} theme
        id: alfa_test
        if: steps.multidev.outcome == 'success'
        run: |
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          echo "Running Siteimprove Alfa tests for ${{ matrix.theme_name }} theme against ${MULTIDEV_URL}"

          # Run Alfa tests locally in GitHub Actions against the multidev URL
          cd tests
          export BASE_URL="${MULTIDEV_URL}"
          export SITEMAP_URL="${MULTIDEV_URL}/sitemap.xml"
          export ALFA_MAX_PAGES=50
          export A11Y_PROFILE=comprehensive
          export A11Y_SEVERITY_LEVELS=critical,serious
          # The renderer looks for `{name}/test-suite-findings.json`; the
          # full-site spec emits `alfa-full`, so the dir must match that name.
          ALFA_OUTPUT_DIR="$(pwd)/reports/alfa-full"
          export ALFA_OUTPUT_DIR

          mkdir -p reports/alfa-full

          # Run the Alfa test (custom HTML report is generated by the spec, no need for Playwright's --reporter=html)
          npx playwright test accessibility/alfa/alfa-full-site.spec.js --reporter=list || \
            echo "⚠️ Alfa spec exited non-zero - deriving the gate from emitted findings"

          # Uniform gate: critical/serious fail, moderate/minor are advisory,
          # incomplete runs (0 pages, errored pages, no findings file) are
          # counted as incomplete by the summary step, never as a pass.
          ALFA_RESULT=$(node accessibility/utils/lane-result.js "${ALFA_OUTPUT_DIR}")
          echo "alfa_result=${ALFA_RESULT}" >> $GITHUB_OUTPUT
          echo "Siteimprove Alfa result for ${{ matrix.theme_name }} theme: ${ALFA_RESULT}"

          # Set HTML report URL for use in GitHub comments
          ALFA_REPORT_URL="${MULTIDEV_URL}/sites/default/files/test-reports/alfa-full/alfa-full-report.html"
          echo "alfa_report_url=${ALFA_REPORT_URL}" >> $GITHUB_OUTPUT
          echo "Alfa HTML report will be available at: ${ALFA_REPORT_URL}"

      - name: Run axe Developer Hub accessibility tests for ${{ matrix.theme_name }} theme
        id: axe_test
        if: steps.multidev.outcome == 'success'
        run: |
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          echo "Running axe Developer Hub tests for ${{ matrix.theme_name }} theme against ${MULTIDEV_URL}"

          # Validate axe API key before running tests
          AXE_KEY="${{ secrets.AXE_API_KEY }}"
          if [ -z "$AXE_KEY" ]; then
            echo "⚠️ AXE_API_KEY secret is not set - skipping axe Developer Hub tests"
            echo "axe_result=skipped" >> $GITHUB_OUTPUT
            echo "axe_skip_reason=API key not configured" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Pre-flight the Deque hub: axe-watcher streams per page, so an
          # unreachable or unauthenticated hub would hang or fail. Run only on
          # a clean 2xx; skip otherwise (bad key, outage, or no connection).
          echo "Checking connection to axe Developer Hub..."
          AXE_CHECK=$(curl -s -o /tmp/axe-check.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 20 \
            -H "Authorization: Bearer ${AXE_KEY}" \
            "https://axe.deque.com/api-pub/watcher/projects") || AXE_CHECK="000"

          case "$AXE_CHECK" in
            2[0-9][0-9])
              rm -f /tmp/axe-check.json
              echo "✅ axe Developer Hub reachable and authenticated (HTTP ${AXE_CHECK})"
              ;;
            *)
              AXE_ERR=$(head -c 300 /tmp/axe-check.json 2>/dev/null || true)
              echo "⚠️ No authenticated connection to axe Developer Hub (HTTP ${AXE_CHECK}) - skipping axe-watcher tests"
              [ -n "$AXE_ERR" ] && echo "   Response: ${AXE_ERR}"
              echo "   Cause: invalid/expired key, hub outage, or no network. axe-core coverage still runs via the axe-full step."
              echo "axe_result=skipped" >> $GITHUB_OUTPUT
              echo "axe_skip_reason=No Deque Developer Hub connection (HTTP ${AXE_CHECK})" >> $GITHUB_OUTPUT
              rm -f /tmp/axe-check.json
              exit 0
              ;;
          esac

          # Run axe tests locally in GitHub Actions against the multidev URL
          cd tests
          export BASE_URL="${MULTIDEV_URL}"
          export SITEMAP_URL="${MULTIDEV_URL}/sitemap.xml"
          export AXE_MAX_PAGES=50
          export AXE_API_KEY="${AXE_KEY}"
          export A11Y_PROFILE=comprehensive
          export A11Y_SEVERITY_LEVELS=critical,serious
          PLAYWRIGHT_REPORT_DIR="$(pwd)/reports/playwright-axe-watcher-full"
          export PLAYWRIGHT_REPORT_DIR

          # Ensure output directory exists
          mkdir -p reports/playwright-axe-watcher-full

          # Run the axe test with Developer Hub integration
          if npx playwright test accessibility/axe/axe-watcher-full-site.spec.ts --config=playwright.config.ts; then
            echo "axe_result=passed" >> $GITHUB_OUTPUT
            echo "✅ axe Developer Hub tests passed for ${{ matrix.theme_name }} theme"
          else
            echo "axe_result=failed" >> $GITHUB_OUTPUT
            echo "❌ axe Developer Hub tests failed for ${{ matrix.theme_name }} theme"
          fi

          # Set HTML report URL for use in GitHub comments
          AXE_REPORT_URL="${MULTIDEV_URL}/sites/default/files/test-reports/playwright-axe-watcher-full/index.html"
          echo "axe_report_url=${AXE_REPORT_URL}" >> $GITHUB_OUTPUT
          echo "axe HTML report will be available at: ${AXE_REPORT_URL}"

      - name: Run axe-core full-site accessibility tests for ${{ matrix.theme_name }} theme
        id: axe_full_test
        if: steps.multidev.outcome == 'success'
        continue-on-error: true
        run: |
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          echo "Running axe-core full-site tests for ${{ matrix.theme_name }} theme against ${MULTIDEV_URL}"

          # Free axe-core path (no API key). Sitemap-wide fallback that keeps
          # the 'best-practice' chip populated even when axe-watcher is skipped.
          cd tests
          export BASE_URL="${MULTIDEV_URL}"
          export SITEMAP_URL="${MULTIDEV_URL}/sitemap.xml"
          export A11Y_PROFILE=comprehensive
          export A11Y_SEVERITY_LEVELS=critical,serious
          export AXE_MAX_PAGES=50
          AXE_OUTPUT_DIR="$(pwd)/reports/axe-full"
          export AXE_OUTPUT_DIR

          mkdir -p reports/axe-full

          npx playwright test accessibility/axe/axe-full-site.spec.ts --config=playwright.config.ts --reporter=list || \
            echo "⚠️ axe-core spec exited non-zero - deriving the gate from emitted findings"

          # Uniform gate: critical/serious fail, moderate/minor are advisory.
          AXE_FULL_RESULT=$(node accessibility/utils/lane-result.js "${AXE_OUTPUT_DIR}")
          echo "axe_full_result=${AXE_FULL_RESULT}" >> $GITHUB_OUTPUT
          echo "axe-core full-site result for ${{ matrix.theme_name }} theme: ${AXE_FULL_RESULT}"

      - name: Run reflow audit (WCAG 2.1 SC 1.4.10) for ${{ matrix.theme_name }} theme
        id: reflow_test
        if: steps.multidev.outcome == 'success'
        continue-on-error: true
        run: |
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          echo "Running reflow audit (320px viewport) for ${{ matrix.theme_name }} theme against ${MULTIDEV_URL}"

          # No rule engine, no API key - Playwright sets viewport to 320px
          # and measures horizontal overflow on every sitemap page. Findings
          # land alongside Alfa/pa11y in the unified report under WCAG 1.4.10.
          cd tests
          export BASE_URL="${MULTIDEV_URL}"
          export SITEMAP_URL="${MULTIDEV_URL}/sitemap.xml"
          export REFLOW_MAX_PAGES=50
          REFLOW_OUTPUT_DIR="$(pwd)/reports/reflow"
          export REFLOW_OUTPUT_DIR

          mkdir -p reports/reflow

          npx playwright test accessibility/reflow/reflow.spec.js --reporter=list || \
            echo "⚠️ Reflow spec exited non-zero - deriving the gate from emitted findings"

          # Uniform gate: reflow findings are serious by definition, so any
          # finding fails; incomplete runs are never read as a pass.
          REFLOW_RESULT=$(node accessibility/utils/lane-result.js "${REFLOW_OUTPUT_DIR}")
          echo "reflow_result=${REFLOW_RESULT}" >> $GITHUB_OUTPUT
          echo "Reflow audit result for ${{ matrix.theme_name }} theme: ${REFLOW_RESULT}"

      - name: Run meta-viewport audit (WCAG 2.0 SC 1.4.4) for ${{ matrix.theme_name }} theme
        id: meta_viewport_test
        if: steps.multidev.outcome == 'success'
        continue-on-error: true
        run: |
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"

          echo "Running meta-viewport audit for ${{ matrix.theme_name }} theme against ${MULTIDEV_URL}"

          # Static DOM check - reads the <meta name="viewport"> tag on each
          # sitemap page and flags `user-scalable=no` or `maximum-scale<2`
          # (zoom-blocking directives that violate SC 1.4.4 Resize Text).
          cd tests
          export BASE_URL="${MULTIDEV_URL}"
          export SITEMAP_URL="${MULTIDEV_URL}/sitemap.xml"
          export META_VIEWPORT_MAX_PAGES=50
          META_VIEWPORT_OUTPUT_DIR="$(pwd)/reports/meta-viewport"
          export META_VIEWPORT_OUTPUT_DIR

          mkdir -p reports/meta-viewport

          npx playwright test accessibility/meta-viewport/meta-viewport.spec.js --reporter=list || \
            echo "⚠️ Meta-viewport spec exited non-zero - deriving the gate from emitted findings"

          # Uniform gate: meta-viewport findings are serious by definition,
          # so any finding fails; incomplete runs are never read as a pass.
          META_VIEWPORT_RESULT=$(node accessibility/utils/lane-result.js "${META_VIEWPORT_OUTPUT_DIR}")
          echo "meta_viewport_result=${META_VIEWPORT_RESULT}" >> $GITHUB_OUTPUT
          echo "Meta-viewport audit result for ${{ matrix.theme_name }} theme: ${META_VIEWPORT_RESULT}"

      - name: Run pa11y accessibility tests for ${{ matrix.theme_name }} theme
        id: pa11y_test
        if: steps.multidev.outcome == 'success'
        continue-on-error: true
        run: |
          MULTIDEV_URL="${{ steps.setvars.outputs.multidev_url }}"
          SITEMAP_URL="${MULTIDEV_URL}/sitemap.xml"

          echo "Running pa11y-ci tests for ${{ matrix.theme_name }} theme against ${SITEMAP_URL}"

          cd tests
          mkdir -p reports/pa11y

          # Mirrors the runtime config produced by drush utest:pa11y, plus
          # CI-only Chrome flags: GitHub runners restrict unprivileged user
          # namespaces, so Chrome's sandbox cannot start and crashes without
          # --no-sandbox; --disable-dev-shm-usage avoids the small /dev/shm.
          cat > .pa11yci.json <<'PA11YCFG'
          {
            "defaults": {
              "standard": "WCAG2AA",
              "includeWarnings": true,
              "timeout": 90000,
              "userAgent": "pa11y-ci accessibility testing",
              "chromeLaunchConfig": {
                "args": ["--ignore-certificate-errors", "--no-sandbox", "--disable-dev-shm-usage"]
              }
            },
            "concurrency": 4
          }
          PA11YCFG

          JSON_PATH="reports/pa11y/pa11y-report.json"
          LOG_PATH="reports/pa11y/pa11y.log"

          # Resolve sitemap URLs ourselves (same origin and count validation
          # as the other lanes) instead of passing --sitemap: pa11y-ci's own
          # fetch treats a challenged or unparseable response as zero URLs
          # and exits clean, which read as a silent empty run. The bypass
          # header gets the real sitemap past Pantheon's bot challenge, and
          # page requests send it too.
          export SITEMAP_URL MULTIDEV_URL
          if node --input-type=module -e "
            import { fetchSitemapUrls } from './accessibility/utils/sitemap.js';
            import { readFileSync, writeFileSync } from 'fs';
            const urls = await fetchSitemapUrls(process.env.SITEMAP_URL, {
              baseUrl: process.env.MULTIDEV_URL,
              maxPages: 0,
              headers: { 'Deterrence-Bypass': '1' },
            });
            const cfg = JSON.parse(readFileSync('.pa11yci.json', 'utf8'));
            cfg.urls = urls;
            cfg.defaults.headers = { 'Deterrence-Bypass': '1' };
            writeFileSync('.pa11yci.json', JSON.stringify(cfg, null, 2));
            console.log('pa11y will test ' + urls.length + ' page(s)');
          "; then
            # pa11y-ci exits non-zero on ANY issue, including warnings and
            # notices, so its exit code alone cannot express the
            # critical/serious-only gate. The gate is computed below from
            # the emitted findings.
            if npx pa11y-ci --json > "${JSON_PATH}" 2>"${LOG_PATH}"; then
              echo "✅ pa11y-ci ran clean for ${{ matrix.theme_name }} theme"
            else
              echo "⚠️ pa11y-ci exited non-zero for ${{ matrix.theme_name }} theme (issues found or crash) - gating on normalized severities below"
            fi
          else
            echo "⚠️ Could not resolve sitemap URLs for pa11y - lane reports incomplete"
          fi

          # Emit unified test-suite-findings.json so the renderer can aggregate
          # pa11y alongside alfa / axe / lint. --html also renders the per-lane
          # pa11y-report.html here on the runner: the drush command's bespoke
          # HTML report only exists on local runs, and Pantheon cannot run the
          # test tooling itself.
          if [ -s "${JSON_PATH}" ]; then
            if node accessibility/pa11y/emit-findings.js "$(pwd)/reports/pa11y" --html; then
              echo "✅ pa11y test-suite-findings.json + HTML report emitted"
            else
              echo "⚠️ pa11y findings emission failed (raw JSON report still available)"
            fi
          fi

          # Uniform gate, same policy as Alfa: critical/serious fail,
          # moderate/minor are advisory, missing findings JSON (crash or
          # empty run) reports incomplete rather than a pass.
          PA11Y_RESULT=$(node accessibility/utils/lane-result.js "$(pwd)/reports/pa11y")
          echo "pa11y_result=${PA11Y_RESULT}" >> $GITHUB_OUTPUT
          echo "pa11y result for ${{ matrix.theme_name }} theme: ${PA11Y_RESULT}"

      - name: Compute multidev URL and overall status
        id: summary
        if: always()
        run: |
          MULTIDEV_NAME="pr-${{ github.event.pull_request.number }}"
          MULTIDEV_URL="https://${MULTIDEV_NAME}-${{ matrix.pantheon_site }}.pantheonsite.io"
          echo "multidev_name=${MULTIDEV_NAME}" >> $GITHUB_OUTPUT
          echo "multidev_url=${MULTIDEV_URL}" >> $GITHUB_OUTPUT

          ALFA="${{ steps.alfa_test.outputs.alfa_result }}"
          AXE="${{ steps.axe_test.outputs.axe_result }}"
          AXE_FULL="${{ steps.axe_full_test.outputs.axe_full_result }}"
          REFLOW="${{ steps.reflow_test.outputs.reflow_result }}"
          META_VIEWPORT="${{ steps.meta_viewport_test.outputs.meta_viewport_result }}"
          PA11Y="${{ steps.pa11y_test.outputs.pa11y_result }}"
          MULTIDEV_OUTCOME="${{ steps.multidev.outcome }}"

          # Uniform three-state rollup over every a11y lane: any lane with
          # critical/serious findings fails; any lane that is incomplete or
          # produced no result makes the run incomplete (never a pass);
          # advisory findings and an allowed axe-watcher skip still pass.
          FAILED=0
          INCOMPLETE=0
          for RESULT in "$ALFA" "$AXE_FULL" "$REFLOW" "$META_VIEWPORT" "$PA11Y"; do
            case "$RESULT" in
              failed) FAILED=1 ;;
              incomplete|"") INCOMPLETE=1 ;;
            esac
          done
          # axe watcher may legitimately skip (no Deque key); only its
          # explicit failure or a missing result while unskipped counts.
          case "$AXE" in
            failed) FAILED=1 ;;
            "") INCOMPLETE=1 ;;
          esac

          if [ "$FAILED" -eq 1 ]; then
            OVERALL="failed"
            echo "status_icon=❌" >> $GITHUB_OUTPUT
          elif [ "$MULTIDEV_OUTCOME" != "success" ] || [ "$INCOMPLETE" -eq 1 ]; then
            OVERALL="incomplete"
            echo "status_icon=⚠️" >> $GITHUB_OUTPUT
          else
            OVERALL="passed"
            echo "status_icon=✅" >> $GITHUB_OUTPUT
          fi
          echo "overall_result=${OVERALL}" >> $GITHUB_OUTPUT

          # Mirror the local `drush utest:all` summary table on the Actions
          # run page. Lane values: passed / findings (advisory only) /
          # failed (critical or serious) / incomplete; empty = did not run.
          {
            echo "### Test Suite Summary - ${{ matrix.theme_display_name }}"
            echo ""
            echo "| Lane | Result |"
            echo "| --- | --- |"
            echo "| Siteimprove Alfa | ${ALFA:-did not run} |"
            echo "| axe Developer Hub | ${AXE:-did not run} |"
            echo "| axe-core (full site) | ${AXE_FULL:-did not run} |"
            echo "| pa11y | ${PA11Y:-did not run} |"
            echo "| Reflow (WCAG 1.4.10) | ${REFLOW:-did not run} |"
            echo "| Meta-viewport (WCAG 1.4.4) | ${META_VIEWPORT:-did not run} |"
            echo "| **Overall** | **${OVERALL}** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-stamp lint report surface for ${{ matrix.theme_name }} multidev
        if: always() && steps.multidev.outcome == 'success'
        env:
          # The lint report was baked in the repo-wide `lint` job before this
          # multidev existed, so it reads "Local (<branch>)". Re-stamp it with
          # this theme's multidev surface so the banner matches index.html.
          MULTIDEV_URL: ${{ steps.setvars.outputs.multidev_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd tests
          node code-quality/restamp-surface.js \
            reports/lint/lint-report.html \
            reports/lint/test-suite-findings.json

      - name: Upload all test reports to ${{ matrix.theme_name }} multidev via SFTP
        if: always() && steps.multidev.outcome == 'success'
        run: |
          # Reports must always be published so reviewers can see findings
          # - even on partial test failures or transient rsync errors.
          # Track issues but never abort early.
          set +e
          upload_failed=0

          SITE="${{ matrix.pantheon_site }}"
          MULTIDEV="${{ steps.summary.outputs.multidev_name }}"

          # Terminus is already installed and authenticated by the earlier
          # push-to-pantheon step; SSH agent + Pantheon host keys are also
          # already set up in this job's runner environment.
          CONNECTION_INFO=$(terminus connection:info ${SITE}.${MULTIDEV} --format=json 2>/dev/null)
          SFTP_HOST=$(echo "$CONNECTION_INFO" | jq -r '.sftp_host // empty' 2>/dev/null)
          SFTP_USER=$(echo "$CONNECTION_INFO" | jq -r '.sftp_username // empty' 2>/dev/null)
          if [ -z "$SFTP_HOST" ] || [ "$SFTP_HOST" = "null" ]; then
            SITE_UUID=$(terminus site:info ${SITE} --field=id 2>/dev/null)
            SFTP_HOST="appserver.${MULTIDEV}.${SITE_UUID}.drush.in"
            SFTP_USER="${MULTIDEV}.${SITE_UUID}"
          fi

          # Switch to SFTP mode. Pantheon's Integrated Composer runs
          # composer install on the multidev after each push and blocks
          # SFTP while it's in-flight or errored. Retry for ~10 min.
          sftp_ready=0
          for attempt in $(seq 1 30); do
            if terminus connection:set ${SITE}.${MULTIDEV} sftp 2>/tmp/sftp-err; then
              echo "Switched to SFTP mode (attempt ${attempt})"
              sftp_ready=1
              break
            fi
            if grep -q "Integrated Composer build" /tmp/sftp-err; then
              echo "Integrated Composer still building (attempt ${attempt}/30) - waiting 20s..."
              sleep 20
            else
              echo "::warning::SFTP mode switch failed with non-IC error:"
              cat /tmp/sftp-err
              break
            fi
          done
          if [ "$sftp_ready" -eq 0 ]; then
            echo "::warning::Could not switch to SFTP mode - uploads will be skipped, report-render will still run against existing files on the multidev"
            upload_failed=1
          fi
          sleep 10

          # Create test-reports directory structure on the multidev.
          if [ "$sftp_ready" -eq 1 ]; then
            terminus drush ${SITE}.${MULTIDEV} -- eval "
              \$fs = \Drupal::service('file_system');
              \$paths = [
                'public://test-reports',
                'public://test-reports/alfa',
                'public://test-reports/alfa-full',
                'public://test-reports/playwright-axe-watcher-full',
                'public://test-reports/axe',
                'public://test-reports/axe-full',
                'public://test-reports/pa11y',
                'public://test-reports/reflow',
                'public://test-reports/meta-viewport',
                'public://test-reports/lint',
                'public://test-reports/phpunit',
              ];
              foreach (\$paths as \$p) {
                \$fs->prepareDirectory(\$p,
                  \Drupal\Core\File\FileSystemInterface::CREATE_DIRECTORY |
                  \Drupal\Core\File\FileSystemInterface::MODIFY_PERMISSIONS);
              }
            " || true
          fi

          # Upload helper: rsync a local subdir to the matching multidev
          # path only when the source has content. Records failures without
          # aborting so the rest of the uploads + report-render still run.
          rsync_if_present() {
            local src="$1"
            local dest_subpath="$2"
            if [ -d "$src" ] && [ "$(ls -A $src 2>/dev/null)" ]; then
              echo "Uploading $src ..."
              # --delete mirrors each lane dir exactly, so report files from
              # older runs (e.g. renamed or redesigned reports) don't linger
              # on the multidev and serve stale layouts.
              if ! rsync -rlvz --delete --size-only --ipv4 --progress -e 'ssh -p 2222 -o StrictHostKeyChecking=no' \
                "$src/" \
                ${SFTP_USER}@${SFTP_HOST}:files/test-reports/${dest_subpath}/; then
                echo "::warning::rsync of $src failed - continuing with remaining uploads"
                upload_failed=1
              fi
            else
              echo "No $src reports to upload"
            fi
          }

          # Test reports are written directly into tests/reports/{name}/
          # by their respective spec runs. Lint reports were placed there
          # by the earlier download-artifact step.
          if [ "$sftp_ready" -eq 1 ]; then
            rsync_if_present "tests/reports/alfa-full"                    alfa-full
            rsync_if_present "tests/reports/playwright-axe-watcher-full"  playwright-axe-watcher-full
            rsync_if_present "tests/reports/axe"                          axe
            rsync_if_present "tests/reports/axe-full"                     axe-full
            rsync_if_present "tests/reports/pa11y"                        pa11y
            rsync_if_present "tests/reports/reflow"                       reflow
            rsync_if_present "tests/reports/meta-viewport"                meta-viewport
            rsync_if_present "tests/reports/lint"                         lint
            rsync_if_present "tests/reports/phpunit"                      phpunit
          fi

          # Always render the unified report so reviewers see whatever
          # findings made it through, even on partial uploads.
          terminus drush ${SITE}.${MULTIDEV} -- utest:report-render || \
            echo "::warning::utest:report-render failed - Test Report may be stale"

          # Always switch back to git mode regardless of outcome.
          terminus connection:set ${SITE}.${MULTIDEV} git || true

          if [ "$upload_failed" -eq 1 ]; then
            echo "::warning::Some report uploads failed - see warnings above. The unified Test Report is still rendered with whatever was published."
          fi

      - name: Post individual theme results comment
        uses: actions/github-script@v8
        if: always()
        env:
          THEME_NAME: ${{ matrix.theme_name }}
          THEME_DISPLAY_NAME: ${{ matrix.theme_display_name }}
          MULTIDEV_URL: ${{ steps.summary.outputs.multidev_url }}
          ALFA_STATUS: ${{ steps.alfa_test.outputs.alfa_result }}
          AXE_STATUS: ${{ steps.axe_test.outputs.axe_result }}
          AXE_SKIP_REASON: ${{ steps.axe_test.outputs.axe_skip_reason }}
          PA11Y_STATUS: ${{ steps.pa11y_test.outputs.pa11y_result }}
          AXE_FULL_STATUS: ${{ steps.axe_full_test.outputs.axe_full_result }}
          REFLOW_STATUS: ${{ steps.reflow_test.outputs.reflow_result }}
          META_VIEWPORT_STATUS: ${{ steps.meta_viewport_test.outputs.meta_viewport_result }}
          LINT_STATUS: ${{ needs.lint.outputs.result }}
          LINT_ERRORS: ${{ needs.lint.outputs.errors }}
          LINT_WARNINGS: ${{ needs.lint.outputs.warnings }}
          LINT_TOTALS_EMITTED: ${{ needs.lint.outputs.totals_emitted }}
          PHPUNIT_STATUS: ${{ needs.functional-testing.outputs.status }}
          PHPUNIT_TESTS: ${{ needs.functional-testing.outputs.tests }}
          PHPUNIT_FAILURES: ${{ needs.functional-testing.outputs.failures }}
          OVERALL_STATUS: ${{ steps.summary.outputs.overall_result }}
          STATUS_ICON: ${{ steps.summary.outputs.status_icon }}
          MULTIDEV_OUTCOME: ${{ steps.multidev.outcome }}
          A11Y_PROFILE: ${{ env.A11Y_PROFILE }}
        with:
          script: |
            const themeDisplayName = process.env.THEME_DISPLAY_NAME;
            const multidevUrl = process.env.MULTIDEV_URL;
            const alfaStatus = process.env.ALFA_STATUS || 'unknown';
            const overallStatus = process.env.OVERALL_STATUS || 'unknown';
            const statusIcon = process.env.STATUS_ICON || '';
            const profile = process.env.A11Y_PROFILE || 'comprehensive';
            // Reports exist only when the multidev was created (the SFTP upload
            // is gated on it); skip the links otherwise so they don't 404.
            const reportsAvailable = process.env.MULTIDEV_OUTCOME === 'success';

            const PROFILE_CRITERIA = {
              strict: 'WCAG 2.0 Level A, WCAG 2.1 Level A',
              standard: 'WCAG 2.0 Level A & AA, WCAG 2.1 Level A & AA',
              comprehensive: 'WCAG 2.0 & 2.1 Levels A, AA, AAA + WCAG 2.2 Levels A, AA + best-practice rules',
              custom: 'User-defined (see A11Y_CUSTOM_TAGS)'
            };
            const profileCriteria = PROFILE_CRITERIA[profile] || `profile-defined (\`${profile}\`)`;

            const reportBase = `${multidevUrl}/sites/default/files/test-reports`;
            const unifiedReportUrl      = `${reportBase}/index.html`;
            const alfaReportUrl         = `${reportBase}/alfa-full/alfa-full-report.html`;
            const axeFullReportUrl      = `${reportBase}/axe-full/axe-full-report.html`;
            const pa11yReportUrl        = `${reportBase}/pa11y/pa11y-report.html`;
            const reflowReportUrl       = `${reportBase}/reflow/reflow-report.html`;
            const metaViewportReportUrl = `${reportBase}/meta-viewport/meta-viewport-report.html`;
            const lintReportUrl         = `${reportBase}/lint/lint-report.html`;
            const phpunitReportUrl      = `${reportBase}/phpunit/phpunit-report.html`;

            const lintStatus = process.env.LINT_STATUS || 'unknown';
            const lintErrors = process.env.LINT_ERRORS || '0';
            const lintWarnings = process.env.LINT_WARNINGS || '0';
            const lintTotalsEmitted = process.env.LINT_TOTALS_EMITTED === 'true';
            // Pick the right message: clean pass, non-zero counts, real
            // zero counts but exit-non-zero (audit advisory etc.), or
            // orchestrator crashed before printing totals. The fallback
            // covers a lint job that never produced a result.
            let lintDetail = '⚠️ Did not run - check the lint job';
            if (lintStatus === 'passed') {
              lintDetail = '✅ Passed';
            } else if (lintStatus === 'failed') {
              const e = parseInt(lintErrors, 10) || 0;
              const w = parseInt(lintWarnings, 10) || 0;
              if (!lintTotalsEmitted) {
                lintDetail = '⚠️ Lint orchestrator crashed before emitting totals - check the lint job logs';
              } else if (e === 0 && w === 0) {
                lintDetail = '⚠️ 0 errors / 0 warnings, but lint exited non-zero (composer audit or sub-tool flagged something - check the lint job logs)';
              } else {
                lintDetail = `⚠️ ${e} error(s), ${w} warning(s)`;
              }
            }

            // axe Developer Hub needs AXE_API_KEY + a live hub; skipped (not
            // failed) when unavailable, so a skip isn't read as a pass.
            // Functional / Regression PHPUnit is report-only; failures never block.
            const phpunitStatus = process.env.PHPUNIT_STATUS || 'unknown';
            const phpunitTests = process.env.PHPUNIT_TESTS || '0';
            const phpunitFailures = process.env.PHPUNIT_FAILURES || '0';
            let phpunitDetail;
            if (phpunitStatus === 'passed') {
              phpunitDetail = `✅ ${phpunitTests} passed`;
            } else if (phpunitStatus === 'failed') {
              phpunitDetail = `⚠️ ${phpunitFailures} of ${phpunitTests} failing (report-only)`;
            } else if (phpunitStatus === 'skipped') {
              phpunitDetail = '⚠️ No custom-module tests found';
            } else {
              // The PHPUnit job never produced a result.
              phpunitDetail = '⚠️ Did not run - check the PHPUnit job';
            }

            // Every a11y lane gates on the same policy: critical/serious
            // findings fail the check; moderate/minor are advisory;
            // incomplete runs are flagged distinctly, never as a pass.
            const laneDetail = (status) => {
              if (status === 'passed') return '✅ Passed';
              if (status === 'failed') return '❌ Failed (critical/serious issues)';
              if (status === 'findings') return '⚠️ Advisory findings only (moderate/minor - see Test Report)';
              if (status === 'incomplete') return '⚠️ Incomplete - not a confirmed pass';
              return '⚠️ Did not run';
            };
            const pa11yDetail = laneDetail(process.env.PA11Y_STATUS || '');
            const axeFullDetail = laneDetail(process.env.AXE_FULL_STATUS || '');
            const reflowDetail = laneDetail(process.env.REFLOW_STATUS || '');
            const metaViewportDetail = laneDetail(process.env.META_VIEWPORT_STATUS || '');

            // Name the lanes behind a failed overall status, mirroring the
            // closing line of a local `drush utest:all` run.
            const laneStatuses = [
              ['Siteimprove Alfa', process.env.ALFA_STATUS || ''],
              ['axe Developer Hub', process.env.AXE_STATUS || ''],
              ['axe-core (full site)', process.env.AXE_FULL_STATUS || ''],
              ['pa11y', process.env.PA11Y_STATUS || ''],
              ['Reflow', process.env.REFLOW_STATUS || ''],
              ['Meta-viewport', process.env.META_VIEWPORT_STATUS || ''],
            ];
            const failedLaneNames = laneStatuses
              .filter(([, s]) => s === 'failed' || s === 'incomplete')
              .map(([name]) => name);

            const axeStatus = process.env.AXE_STATUS || '';
            const axeSkipReason = process.env.AXE_SKIP_REASON || '';
            let axeDetail;
            if (axeStatus === 'passed') {
              axeDetail = '✅ Passed';
            } else if (axeStatus === 'failed') {
              axeDetail = '❌ Failed (critical/serious issues)';
            } else if (axeStatus === 'skipped') {
              axeDetail = `⚠️ Did not run - Deque key inactive or no connection${axeSkipReason ? ` (${axeSkipReason})` : ''}`;
            } else {
              // Step never executed (e.g. the multidev was not created).
              axeDetail = '⚠️ Did not run';
            }

            let comment = `## ${statusIcon} Accessibility & Code Quality Testing - ${themeDisplayName}\n\n`;
            comment += `**Accessibility profile**: \`${profile}\` - covers ${profileCriteria}\n\n`;
            comment += `### Test Results Summary\n`;
            comment += `- **Overall Status**: ${statusIcon} ${overallStatus.toUpperCase()}\n`;
            comment += `- **Siteimprove Alfa**: ${laneDetail(alfaStatus === 'unknown' ? '' : alfaStatus)}\n`;
            comment += `- **axe Developer Hub (Deque)**: ${axeDetail}\n`;
            comment += `- **axe-core (full site)**: ${axeFullDetail}\n`;
            comment += `- **pa11y**: ${pa11yDetail}\n`;
            comment += `- **Reflow (WCAG 1.4.10)**: ${reflowDetail}\n`;
            comment += `- **Meta-viewport (WCAG 1.4.4)**: ${metaViewportDetail}\n`;
            comment += `- **Code Linting**: ${lintDetail}\n`;
            comment += `- **Functional / Regression (PHPUnit)**: ${phpunitDetail}\n`;
            if (reportsAvailable) {
              comment += `- **Test Environment**: [${multidevUrl}](${multidevUrl})\n\n`;
              comment += `### Detailed Reports\n`;
              comment += `- [**Test Report**](${unifiedReportUrl}) - Combined accessibility, security, and code quality. **Start here.**\n`;
              comment += `- [Siteimprove Alfa](${alfaReportUrl})\n`;
              comment += `- [axe-core (full site)](${axeFullReportUrl})\n`;
              comment += `- [pa11y](${pa11yReportUrl})\n`;
              comment += `- [Reflow (WCAG 1.4.10)](${reflowReportUrl})\n`;
              comment += `- [Meta-viewport (WCAG 1.4.4)](${metaViewportReportUrl})\n`;
              comment += `- [Code Linting](${lintReportUrl})\n`;
              comment += `- [PHPUnit (Functional / Regression)](${phpunitReportUrl})\n\n`;
            } else {
              // No multidev, so no browsable a11y reports. Lint and PHPUnit
              // ran on the CI runner; their reports are workflow artifacts.
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              comment += `- **Test Environment**: not created (accessibility reports not published)\n\n`;
              comment += `### Detailed Reports\n`;
              comment += `Code Linting and PHPUnit ran on the CI runner; download their reports here:\n`;
              let artifactLinks = '';
              try {
                const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: context.runId,
                });
                const wanted = { 'lint-report': 'Code Linting report', 'phpunit-report': 'PHPUnit report' };
                artifactLinks = data.artifacts
                  .filter(a => wanted[a.name])
                  .map(a => `- [${wanted[a.name]}](${runUrl}/artifacts/${a.id}) (zip)\n`)
                  .join('');
              } catch (error) {
                console.log(`Could not list run artifacts: ${error.message}`);
              }
              comment += artifactLinks || `- [Workflow run](${runUrl}) - see the \`lint-report\` and \`phpunit-report\` artifacts at the bottom of the page\n`;
              comment += `\n`;
            }

            if (overallStatus === 'passed') {
              comment += `### ✅ Success!\n`;
              comment += `All accessibility tests passed for ${themeDisplayName} under the \`${profile}\` profile (${profileCriteria}).\n\n`;
            } else if (overallStatus === 'failed') {
              comment += `### ❌ Action Required\n`;
              comment += `Lanes with critical/serious findings or incomplete runs: ${failedLaneNames.join(', ')}. Details are in the reports above.\n\n`;
            } else {
              comment += `### ⚠️ Results Incomplete\n`;
              comment += `Accessibility tests did not run to completion for ${themeDisplayName}, so this is **not a confirmed pass** (and not a code failure). The test environment was likely unavailable; most often the multidev could not be created because the multidev quota was reached. Free a slot (close old PRs) and re-run, then check the logs.\n\n`;
            }

            comment += `---\n`;
            comment += `*Individual theme results - Full summary will be posted when all themes complete*`;

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              console.log(`Posted individual results comment for ${themeDisplayName}`);
            } catch (error) {
              console.error(`Failed to post comment for ${themeDisplayName}:`, error);
            }

      # Anything other than a clean pass goes red, so a green check always means
      # "tests ran and passed". Incomplete (tests did not run) is labelled
      # distinctly from a real failure.
      - name: Set job status for ${{ matrix.theme_name }} theme
        if: steps.summary.outputs.overall_result != 'passed'
        run: |
          if [ "${{ steps.summary.outputs.overall_result }}" = "incomplete" ]; then
            echo "::error::${{ matrix.theme_name }}: accessibility tests did not run to completion (incomplete, not a confirmed pass). Usually the multidev was not created; see the PR comment."
          else
            echo "::error::${{ matrix.theme_name }}: accessibility tests found serious/critical issues. See the PR comment and report."
          fi
          exit 1
