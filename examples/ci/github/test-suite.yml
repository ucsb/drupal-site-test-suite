# EXAMPLE — minimal, host-agnostic GitHub Actions pipeline for the test suite.
# Not wired to run in this repo. Copy to .github/workflows/ in your project.
#
# It runs the same lanes as the full Pantheon reference (../github-pantheon/):
# gitleaks secrets scanning, lint, PHPUnit, and the six accessibility lanes
# (Alfa, axe-core, optional axe Developer Hub, pa11y, reflow, meta-viewport),
# with the same gate: critical/serious a11y findings or an INCOMPLETE lane
# fail the check; lint and PHPUnit are report-only.
#
# It assumes BASE_URL already points at a REACHABLE running Drupal site.
# PROVISIONING THAT SITE IS HOST-SPECIFIC AND OUT OF SCOPE HERE:
#   - Pantheon: deploy a per-PR multidev (see ../github-pantheon/ and the
#     pantheon-systems/push-to-pantheon action).
#   - Acquia:   deploy to an on-demand / CD environment via Acquia Cloud/Pipelines.
#   - Other:    build + serve the site in-job, or point at an existing staging URL.
# Add your deploy step where marked, then set BASE_URL to the resulting URL.
name: Test Suite

on:
  pull_request:
  workflow_dispatch:

env:
  A11Y_PROFILE: comprehensive
  A11Y_SEVERITY_LEVELS: critical,serious

jobs:
  # Committed-secret scan (gitleaks): PR diff on PRs, full history otherwise.
  secrets-scan:
    name: Secrets scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan for committed secrets
        run: |
          CONFIG_FLAG=""
          if [ -f tests/code-quality/security/.gitleaks.toml ]; then
            CONFIG_FLAG="--config=tests/code-quality/security/.gitleaks.toml"
          fi
          LOG_OPTS=""
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            LOG_OPTS="--log-opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          fi
          gitleaks detect ${CONFIG_FLAG} --source=. ${LOG_OPTS} \
            --redact --exit-code=1 --verbose

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      # Brings in the PHP dev tools the lint lanes shell out to
      # (phpcs/phpstan/twigcs, ...) from your composer.json.
      - run: composer install --no-interaction --prefer-dist

      # Install the suite's Node deps + Playwright browsers (with system deps).
      - name: Install suite toolchain
        working-directory: tests
        run: |
          npm ci
          npx playwright install --with-deps

      # >>> HOST-SPECIFIC: deploy/provision the site under test here, then set
      #     BASE_URL to its URL (Pantheon push-to-pantheon, Acquia, etc.).

      # CI tests a REMOTE/deployed site, so the lanes are called directly
      # (node orchestrator + Playwright specs + the PHPUnit runner) — not via
      # `drush utest:*`, which is the LOCAL entry point and needs a bootstrapped
      # local Drupal.

      # Code quality (report-only: findings never fail the check).
      - name: Code quality (report-only)
        working-directory: tests
        continue-on-error: true
        run: node code-quality/lint-orchestrator.js

      # Functional / regression (custom-module PHPUnit). Report-only.
      - name: Functional / regression (report-only)
        continue-on-error: true
        run: node tests/phpunit/run.js tests/reports/phpunit

      # Accessibility lanes against BASE_URL; shared gate at the end.
      - name: Accessibility
        working-directory: tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}         # the reachable site under test
          AXE_API_KEY: ${{ secrets.AXE_API_KEY }}   # optional (axe Developer Hub)
        run: |
          export SITEMAP_URL="${BASE_URL}/sitemap.xml"

          # Siteimprove Alfa (full sitemap).
          ALFA_OUTPUT_DIR="$(pwd)/reports/alfa-full"
          export ALFA_OUTPUT_DIR
          npx playwright test accessibility/alfa/alfa-full-site.spec.js --reporter=list || \
            echo "Alfa spec exited non-zero - gate derived from findings below"

          # axe-core (full sitemap).
          AXE_OUTPUT_DIR="$(pwd)/reports/axe-full"
          export AXE_OUTPUT_DIR
          npx playwright test accessibility/axe/axe-full-site.spec.ts --config=playwright.config.ts --reporter=list || \
            echo "axe spec exited non-zero - gate derived from findings below"

          # axe Developer Hub (optional commercial lane; skipped without a key).
          if [ -n "${AXE_API_KEY:-}" ]; then
            PLAYWRIGHT_REPORT_DIR="$(pwd)/reports/playwright-axe-watcher-full"
            export PLAYWRIGHT_REPORT_DIR
            npx playwright test accessibility/axe/axe-watcher-full-site.spec.ts --config=playwright.config.ts --reporter=list || \
              echo "axe Developer Hub spec exited non-zero (results live on the Deque dashboard)"
          else
            echo "AXE_API_KEY not set - skipping the optional axe Developer Hub lane"
          fi

          # Reflow at 320px (WCAG 2.1 SC 1.4.10).
          REFLOW_OUTPUT_DIR="$(pwd)/reports/reflow"
          export REFLOW_OUTPUT_DIR
          npx playwright test accessibility/reflow/reflow.spec.js --reporter=list || \
            echo "Reflow spec exited non-zero - gate derived from findings below"

          # Meta-viewport zoom-blocking check (WCAG 2.0 SC 1.4.4).
          META_VIEWPORT_OUTPUT_DIR="$(pwd)/reports/meta-viewport"
          export META_VIEWPORT_OUTPUT_DIR
          npx playwright test accessibility/meta-viewport/meta-viewport.spec.js --reporter=list || \
            echo "Meta-viewport spec exited non-zero - gate derived from findings below"

          # pa11y (config generated at runtime; Chrome flags required on CI runners).
          mkdir -p reports/pa11y
          cat > .pa11yci.json <<'PA11YCFG'
          {
            "defaults": {
              "standard": "WCAG2AA",
              "includeWarnings": true,
              "timeout": 90000,
              "userAgent": "pa11y-ci accessibility testing",
              "chromeLaunchConfig": {
                "args": ["--ignore-certificate-errors", "--no-sandbox", "--disable-dev-shm-usage"]
              }
            },
            "concurrency": 4
          }
          PA11YCFG
          if node --input-type=module -e "
            import { fetchSitemapUrls } from './accessibility/utils/sitemap.js';
            import { readFileSync, writeFileSync } from 'fs';
            const urls = await fetchSitemapUrls(process.env.SITEMAP_URL, {
              baseUrl: process.env.BASE_URL,
              maxPages: 0,
            });
            const cfg = JSON.parse(readFileSync('.pa11yci.json', 'utf8'));
            cfg.urls = urls;
            writeFileSync('.pa11yci.json', JSON.stringify(cfg, null, 2));
            console.log('pa11y will test ' + urls.length + ' page(s)');
          "; then
            npx pa11y-ci --json > reports/pa11y/pa11y-report.json 2> reports/pa11y/pa11y.log || \
              echo "pa11y-ci exited non-zero - gate derived from findings below"
            if [ -s reports/pa11y/pa11y-report.json ]; then
              node accessibility/pa11y/emit-findings.js "$(pwd)/reports/pa11y" --html || \
                echo "pa11y findings emission failed (raw JSON report still available)"
            fi
          else
            echo "Could not resolve sitemap URLs for pa11y - lane reports incomplete"
          fi

          # Gate: critical/serious findings or an INCOMPLETE lane fail the check.
          STATUS=0
          for lane in alfa-full axe-full pa11y reflow meta-viewport; do
            RESULT=$(node accessibility/utils/lane-result.js "$(pwd)/reports/${lane}")
            echo "lane ${lane}: ${RESULT}"
            case "${RESULT}" in
              failed|incomplete) STATUS=1 ;;
            esac
          done
          exit "${STATUS}"

      # Unified-report render omitted (Drush/local only); see ../github-pantheon/.

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: tests/reports/
